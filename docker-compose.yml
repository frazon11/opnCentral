services:
  opnsense-central:
    build: .
    container_name: OPNsense-Central
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8788}:80"
    environment:
      TZ: ${TZ:-Europe/Brussels}
      APP_NAME: ${APP_NAME:-OPNsense Central Lite}
      APP_KEY: ${APP_KEY}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SESSION_SECURE: ${SESSION_SECURE:-false}
    volumes:
      - ${BASE_PATH:-/volume1/docker/opnsense-central}/data:/var/www/data
      - ${BASE_PATH:-/volume1/docker/opnsense-central}/backups:/var/www/backups
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/health.php || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
